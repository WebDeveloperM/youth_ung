services:
  db:
    image: postgres:17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Bind to localhost only — DB must not be reachable from outside the host
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my_network

  web:
    build: .
    container_name: django_api
    # Dev override: add "command: python manage.py runserver 0.0.0.0:8000" in docker-compose.override.yml
    volumes:
      - .:/app
      - static_files:/app/files/static
      - media_files:/app/files/uploads
    ports:
      # Production: bind to localhost only — nginx reverse proxy handles public traffic
      - '127.0.0.1:8000:8000'
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      # Override HOST to point to the db service inside Docker (not host.docker.internal from .env)
      - HOST=db
    networks:
      - my_network
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    container_name: django_ngrok
    depends_on:
      - web
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http web:8000 --log=stdout
    networks:
      - my_network
    restart: 'no'

volumes:
  postgres_data:
  static_files:
  media_files:

networks:
  my_network:
    driver: bridge
